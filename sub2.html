<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감성미식 BIZ — 회원가입</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov-dynamic-subset.min.css">
  <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>
  <a href="#main" class="skip-to-content">본문 바로가기</a>
  <header id="header" hidden></header>

  <main id="main" class="auth-modal-page">
    <section class="auth-modal" aria-labelledby="signup-title">
      <div class="container">
      <a class="auth-modal__close" href="sub.html" aria-label="회원가입 닫기">&times;</a>

      <h1 class="auth-modal__title" id="signup-title">회원가입</h1>
      <p class="auth-modal__subtitle">계정 정보 입력</p>

      <form action="sub2-2.html" method="get">
        <div class="auth-modal__field">
          <label class="auth-modal__label" for="signup-name">상호명</label>
          <div class="auth-modal__row">
            <input class="auth-modal__input" type="text" id="signup-name" name="business-name"
                   placeholder="example" autocomplete="organization" required>
            <button type="button" class="auth-modal__search">중복확인</button>
          </div>
        </div>

        <div class="auth-modal__field">
          <label class="auth-modal__label" for="signup-password">비밀번호</label>
          <input class="auth-modal__input" type="password" id="signup-password" name="password"
                 placeholder="********" autocomplete="new-password" required>
        </div>

        <div class="auth-modal__field">
          <label class="auth-modal__label" for="signup-password-confirm">비밀번호 확인</label>
          <input class="auth-modal__input" type="password" id="signup-password-confirm" name="password-confirm"
                 placeholder="********" autocomplete="new-password" required>
        </div>

        <div class="auth-modal__field">
          <div class="auth-modal__label-row">
            <label class="auth-modal__label" for="signup-email">이메일</label>
            <span class="auth-modal__label-note">선택 인증 &middot; 계정 찾기용</span>
          </div>
          <input class="auth-modal__input" type="email" id="signup-email" name="email"
                 placeholder="email@example.com" autocomplete="email">
        </div>

        <button type="submit" class="auth-modal__submit">다음단계로 (1/3)</button>
      </form>
      </div>
    </section>
  </main>
  <footer id="footer" hidden></footer>
</body>
</html>
